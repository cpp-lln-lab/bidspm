---
version: 2
updates:
-   package-ecosystem: github-actions
    directory: /
    schedule:
        interval: semiannually
    groups:
        actions-infrastructure:
            patterns:
            -   actions/*
-   package-ecosystem: gitsubmodule
    directory: /
    schedule:
        interval: semiannually
    groups:
        gitsubmodule-dependencies:
            patterns:
            -   '*'
